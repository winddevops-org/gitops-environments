name: my-angular-app

image:
  repository: 192.168.1.239:8444/docker-hub/app   # ← Changement clé : port 8444 (HTTPS)
  tag: 137794c7baa56fc4ab26cd65bb8e6232bd92cc9e
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: nexus-registry-secret

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: nginx
  host: my-app.staging.local
  path: /
  pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env: []
