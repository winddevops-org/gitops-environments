controller:
  hostNetwork: true              # ← CLÉ : Bind le port 80 directement
  dnsPolicy: ClusterFirstWithHostNet
  
  service:
    type: ClusterIP              # ← Plus de NodePort !
    ports:
      http: 80
      https: 443

  resources:
    requests:
      cpu: 100m
      memory: 90Mi
    limits:
      cpu: 200m
      memory: 180Mi

metrics:
  enabled: false
